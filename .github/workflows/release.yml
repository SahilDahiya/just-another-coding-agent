name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: jaca-wheel-linux-amd64
          - os: windows-latest
            artifact_name: jaca-wheel-windows-amd64
          - os: macos-13
            artifact_name: jaca-wheel-macos-amd64
          - os: macos-14
            artifact_name: jaca-wheel-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build bundled wheel
        env:
          JACA_BUILD_TUI: "1"
        run: uv build --wheel

      - name: Verify bundled wheel contents
        run: python scripts/verify_bundled_wheel.py dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
